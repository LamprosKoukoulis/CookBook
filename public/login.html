<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div id="header-container"></div>
<script src="./js/header.js"></script>

<div class="container">
    <h1>Login</h1>

    <form id="loginForm">
        <input
            type="email"
            id="email"
            placeholder="Email"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>
    </form>

    <p>
        No account?
        <a href="/register.html">
            Register
        </a>
    </p>
</div>

<script src="/js/login.js"></script>

</body>
</html>
